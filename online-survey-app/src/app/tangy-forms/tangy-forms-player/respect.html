    <!-- xAPI initialization: read launch parameters and configure wrapper -->
    <script type="module">
      import { XAPIWrapper } from './xapi-wrapper.js';

      const urlParams = new URLSearchParams(window.location.search);
      window.launch = {};
      for (const [key, value] of urlParams.entries()) {
        if (key === 'endpoint' || key === 'auth' || key === 'actor' || key === 'registration') {
          try {
            launch[key] = JSON.parse(value);
          } catch (e) {
            launch[key] = value;
          }
        }
      }
      launch.registration = launch.registration ? launch.registration : (function uuid() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
          var r = Math.random()*16|0, v = c==='x' ? r : (r&0x3|0x8);
          return v.toString(16);
        });
      })();
      launch.activity_id = "form-1";
      launch.grouping = "group-1";
      let hasLRSConfig = launch.endpoint && launch.auth;

      if (hasLRSConfig) {
        ADL.XAPIWrapper.changeConfig({
          endpoint: launch.endpoint,
          auth: launch.auth,
        });
      }
      if (hasLRSConfig) {
        const box = document.getElementById('lrs-info');
        const tbody = document.querySelector('#lrs-info-table tbody');
        box.style.display = 'block';
        // clear previous rows
        tbody.innerHTML = '';
        for (const [key, value] of Object.entries(launch)) {
          const row = document.createElement('tr');
          const kcell = document.createElement('td');
          kcell.textContent = key;
          kcell.style.borderBottom = '1px solid #ddd';
          const vcell = document.createElement('td');
          // pretty-print objects
          vcell.textContent = (typeof value === 'object' && value !== null)
            ? JSON.stringify(value)
            : value;
          vcell.style.borderBottom = '1px solid #ddd';
          row.appendChild(kcell);
          row.appendChild(vcell);
          tbody.appendChild(row);
        }
      }
    </script>

    <script>
      // Attach submit listener to ALL tangy-form elements on the page
      // This runs after all forms are rendered
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('tangy-form').forEach(form => {
          form.addEventListener('submit', event => {
            // By default, the form response is locked and the user can browse it. Use event.preventDefault()
            // to do something else.
            event.preventDefault();
            // 3 ways to inspect the user's response to the form. Ordered by level of detail.
            console.log(event.target);
            console.log(event.target.response);
            console.log(event.target.inputs);
            console.log(event.target.values);

            let statements = [];
            const inputs = event.target.inputs || [];
            if (inputs.length > 0 && launch && launch.registration) {
              inputs.forEach(inp => {
                if (inp.xapiStatement && typeof inp.xapiStatement === 'object') {
                  inp.xapiStatement.context.registration = launch.registration;
                  statements.push(inp.xapiStatement);
                }
              });
            }
            if (statements.length === 0) return;
            try {
              const res = ADL.XAPIWrapper.sendStatements(statements);
              console.log('xAPI submit results', res, statements);
            } catch (e) {
              console.warn('failed sending xAPI submit statements', e);
            }
          });
        });
      });
    </script>

    <!-- simple accordion with list header and back button -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const container = document.querySelector('.vertical-section-container');
        if (container) {
          // insert title and back button just after the LRS info box
          const lrsBox = document.getElementById('lrs-info');
          const title = document.createElement('h2');
          title.id = 'forms-list-title';
          title.textContent = 'Forms';
          title.style.margin = '15px';

          const back = document.createElement('button');
          back.id = 'list-back-button';
          back.textContent = '← Back';
          back.type = 'button';

          if (lrsBox && container.contains(lrsBox)) {
            container.insertBefore(title, lrsBox.nextSibling);
            container.insertBefore(back, title.nextSibling);
          } else {
            container.insertBefore(title, container.firstChild);
            container.insertBefore(back, title.nextSibling);
          }
        }

        const headings = document.querySelectorAll('.vertical-section-container > h3');
        let currentOpen = null;

        // Function to toggle form open/closed state
        function toggleForm(h3, shouldOpen) {
          const next = h3.nextElementSibling;
          if (!next || next.tagName !== 'DEMO-SNIPPET') return;

          if (shouldOpen === undefined) {
            shouldOpen = (next.style.display === 'none' || next.style.display === '');
          }

          if (shouldOpen) {
            // open this one
            next.style.display = 'block';
            h3.classList.add('selected');
            // hide other headings
            headings.forEach(o => { if (o !== h3) o.style.display = 'none'; });
            document.getElementById('list-back-button').style.display = 'inline-block';
            currentOpen = h3;
          } else {
            // closing current
            next.style.display = 'none';
            h3.classList.remove('selected');
            headings.forEach(o => { o.style.display = 'block'; });
            document.getElementById('list-back-button').style.display = 'none';
            currentOpen = null;
          }
        }

        // Back button click handler - directly execute close logic
        document.getElementById('list-back-button').addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          if (currentOpen) {
            toggleForm(currentOpen, false);
          }
        });

        // H3 heading click handlers
        headings.forEach(h3 => {
          h3.style.cursor = 'pointer';
          h3.addEventListener('click', () => {
            toggleForm(h3);
          });
        });

        // Open the first demo section by default
        if (headings.length > 0) {
          toggleForm(headings[0], true);
        }
      });
    </script>

    <!-- Hide loading spinner once page is fully loaded -->
    <script>
      function hideLoadingSpinner() {
        const spinner = document.getElementById('loading-spinner');
        const body = document.body;
        if (spinner) {
          spinner.classList.add('hide');
          // Remove loading class after animation completes
          setTimeout(() => {
            body.classList.remove('loading');
            spinner.style.display = 'none';
          }, 300);
        }
      }

      // Wait for DOM and web components to be ready
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', () => {
          // Give web components a moment to fully initialize
          setTimeout(hideLoadingSpinner, 500);
        });
      } else {
        // If this script runs after DOMContentLoaded
        setTimeout(hideLoadingSpinner, 500);
      }

      // Also hide on window load to be safe
      window.addEventListener('load', hideLoadingSpinner);
    </script>
