server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    error_log /dev/stdout debug;
    access_log /dev/stdout;

    # Server-UI (admin interface)
    location / {
      proxy_pass http://server-ui:80;
      proxy_set_header Host $http_host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Server API endpoints
    location /login {
      proxy_set_header Host $http_host;
      proxy_pass http://server:80/login;
    }
    location /nest {
      proxy_pass http://server:80/nest;
    }
    location /files {
      proxy_pass http://server:80/files;
    }
    location /users {
      proxy_pass http://server:80/users;
    }
    location /api/ {
      proxy_pass http://server:80/api/;
    }
    location /db {
      proxy_pass http://server:80/db;
    }
    location /editor {
      proxy_pass http://server:80/editor;
    }
    location /groups {
      proxy_pass http://server:80/groups;
    }
    location /releases {
      proxy_pass http://server:80/releases;
    }
    location /csv {
      proxy_pass http://server:80/csv;
    }
    location /usage {
      proxy_pass http://server:80/usage;
    }
    location /configuration {
      proxy_pass http://server:80/configuration;
    }
    location /config {
      proxy_pass http://server:80/config;
    }
    location /onlineSurvey {
      proxy_pass http://server:80/onlineSurvey;
    }
    location /permissions {
      proxy_pass http://server:80/permissions;
    }
    location /permissionsList {
      proxy_pass http://server:80/permissionsList;
    }
    location /extendSession {
      proxy_pass http://server:80/extendSession;
    }
    location /apis {
      proxy_pass http://server:80/apis;
    }
    location /opds {
      proxy_set_header Host $http_host;
      proxy_pass http://server:80/opds;
    }
    location /respect-app-manifest {
      proxy_set_header Host $http_host;
      proxy_pass http://server:80/respect-app-manifest;
    }
    location /rolesByGroupId {
      proxy_pass http://server:80/rolesByGroupId;
    }
    location /sync-session-v2 {
      proxy_pass http://server:80/sync-session-v2;
    }
    location /group-device-public {
      proxy_pass http://server:80/group-device-public;
    }

    # Media upload/download endpoints (larger body size)
    location ~ ^/app/([^/]+)/media-list {
      proxy_pass http://server:80/api/$1/media-list;
    }
    location ~ ^/app/([^/]+)/media-upload {
      proxy_pass http://server:80/files/$1/media-upload;
      proxy_set_header Connection $http_connection;
      proxy_http_version 1.1;
      proxy_redirect off;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $http_host;
      proxy_cache_bypass $http_upgrade;
      client_max_body_size 5M;
    }
    location ~ ^/app/([^/]+)/client-media-upload {
      proxy_pass http://server:80/files/$1/client-media-upload;
    }
    location ~ ^/app/([^/]+)/media-delete {
      proxy_pass http://server:80/files/$1/media-delete;
    }

    # APK Generator
    location /apk-generator {
      proxy_pass http://apk-generator:80/apk-generator;
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
